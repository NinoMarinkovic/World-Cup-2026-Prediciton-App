<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bracket — WM Predictor 2026</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bracket.css') }}">
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo">⚽ <span>WM</span> Predictor</div>
  <ul class="nav-links">
    <li><a href="/matches">Matches</a></li>
    <li><a href="/leaderboard">Leaderboard</a></li>
    <li><a href="/bracket" class="active">Bracket</a></li>
    <li><a href="/profile">Profile</a></li>
  </ul>
  <div class="nav-user">
    <span>Logged in as <strong>{{ username }}</strong></span>
    <button class="btn btn-ghost" id="logout-btn">Log out</button>
  </div>
</nav>

<!-- Page -->
<main class="page" style="max-width: 1500px;">

  <div class="bracket-header">
    <div class="section-label">Knockout stage</div>
    <h1 class="section-title">Bracket</h1>
  </div>

  <div class="bracket-scroll">
    <div id="bracket-tree">
      <div class="bracket-empty">
        <div class="loader"></div>
      </div>
    </div>
  </div>

</main>

<script src="{{ url_for('static', filename='js/bracket.js') }}"></script>
</body>
</html>
