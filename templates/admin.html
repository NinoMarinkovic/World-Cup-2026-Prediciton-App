<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — WM Predictor 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a1f0e;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #fff;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
  }

  .nav-logo { font-size: 1rem; font-weight: 700; color: #fff; text-decoration: none; }
  .nav-logo span { color: #D4AF37; }

  .btn-logout {
    padding: 0.35rem 0.8rem;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-logout:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

  .main { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }

  .page-header { margin-bottom: 2rem; }
  .page-header h2 { font-size: 1.4rem; font-weight: 700; }
  .page-header p { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 0.25rem; }

  .admin-badge {
    display: inline-block;
    background: rgba(212,175,55,0.15);
    border: 1px solid rgba(212,175,55,0.3);
    color: #D4AF37;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-left: 0.5rem;
  }

  .section { margin-bottom: 2rem; }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.4);
    margin-bottom: 0.75rem;
  }

  .match-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 0.9rem 1.25rem;
    margin-bottom: 0.5rem;
  }

  .match-row.is-finished {
    opacity: 0.5;
  }

  .match-info { flex: 1; }

  .match-teams {
    font-size: 0.9rem;
    font-weight: 600;
  }

  .match-time {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    margin-top: 0.2rem;
  }

  .score-display {
    font-size: 0.85rem;
    color: #D4AF37;
    font-weight: 700;
    min-width: 60px;
    text-align: center;
  }

  .score-inputs {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .score-input {
    width: 44px;
    padding: 0.4rem;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .score-input:focus { border-color: #D4AF37; }

  .sep { color: rgba(255,255,255,0.3); font-weight: 700; }

  .btn-submit {
    padding: 0.4rem 0.9rem;
    background: #1a6b2e;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-submit:hover { background: #1f8038; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    padding: 0.7rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 999;
    animation: fadeIn 0.2s ease;
  }

  .toast-success { background: #1a6b2e; color: #fff; }
  .toast-error { background: #c0392b; color: #fff; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .loading { text-align: center; padding: 3rem; color: rgba(255,255,255,0.3); }
  .empty { text-align: center; padding: 2rem; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/matches">WM Predictor <span>2026</span></a>
  <div style="display:flex;align-items:center;gap:1rem;">
    <span style="font-size:0.8rem;color:rgba(255,255,255,0.4)">Admin Panel</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <h2>Admin Panel <span class="admin-badge">Admin</span></h2>
    <p>Submit match results and update scores.</p>
  </div>

  <div class="section">
    <div class="section-title">Pending Results</div>
    <div id="pending-list"><div class="loading">Loading matches...</div></div>
  </div>

  <div class="section">
    <div class="section-title">Finished Matches</div>
    <div id="finished-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
  let allMatches = [];

  async function loadMatches() {
    try {
      const res = await fetch('/api/matches');
      const data = await res.json();
      allMatches = data.matches || [];
      renderLists();
    } catch {
      document.getElementById('pending-list').innerHTML = '<div class="empty">Failed to load matches.</div>';
    }
  }

  function formatDate(dt) {
    return new Date(dt).toLocaleString('en-GB', {
      day: '2-digit', month: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function renderLists() {
    const pending  = allMatches.filter(m => !m.finished);
    const finished = allMatches.filter(m => m.finished);

    document.getElementById('pending-list').innerHTML = pending.length
      ? pending.map(buildRow).join('')
      : '<div class="empty">No pending matches.</div>';

    document.getElementById('finished-list').innerHTML = finished.length
      ? finished.map(m => `
          <div class="match-row is-finished">
            <div class="match-info">
              <div class="match-teams">${m.home_team} vs ${m.away_team}</div>
              <div class="match-time">${formatDate(m.kickoff_time)}</div>
            </div>
            <div class="score-display">${m.home_score} : ${m.away_score}</div>
          </div>`).join('')
      : '<div class="empty">No finished matches yet.</div>';

    document.querySelectorAll('.submit-btn').forEach(btn => {
      btn.addEventListener('click', () => submitResult(btn));
    });
  }

  function buildRow(m) {
    return `
      <div class="match-row" data-id="${m.id}">
        <div class="match-info">
          <div class="match-teams">${m.home_team} vs ${m.away_team}</div>
          <div class="match-time">${formatDate(m.kickoff_time)}</div>
        </div>
        <div class="score-inputs">
          <input class="score-input home-score" type="number" min="0" max="99" placeholder="0">
          <span class="sep">:</span>
          <input class="score-input away-score" type="number" min="0" max="99" placeholder="0">
        </div>
        <button class="btn-submit submit-btn" data-match-id="${m.id}">Submit</button>
      </div>`;
  }

  async function submitResult(btn) {
    const row      = btn.closest('.match-row');
    const matchId  = parseInt(btn.dataset.matchId);
    const homeScore = parseInt(row.querySelector('.home-score').value);
    const awayScore = parseInt(row.querySelector('.away-score').value);

    if (isNaN(homeScore) || isNaN(awayScore)) {
      showToast('Please enter both scores.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = '...';

    try {
      const res = await fetch('/api/results', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ match_id: matchId, home_score: homeScore, away_score: awayScore })
      });
      const data = await res.json();

      if (!res.ok) {
        showToast(data.error || 'Error submitting result.', 'error');
        btn.disabled = false;
        btn.textContent = 'Submit';
      } else {
        showToast(`Result saved: ${homeScore} : ${awayScore}`, 'success');
        await loadMatches();
      }
    } catch {
      showToast('Network error.', 'error');
      btn.disabled = false;
      btn.textContent = 'Submit';
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/';
  }

  loadMatches();
</script>
</body>
</html>
