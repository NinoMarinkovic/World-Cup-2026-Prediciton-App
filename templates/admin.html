<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — WM Predictor 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a1f0e;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #fff;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
  }

  .nav-logo { font-size: 1rem; font-weight: 700; color: #fff; text-decoration: none; }
  .nav-logo span { color: #D4AF37; }

  .btn-logout {
    padding: 0.35rem 0.8rem;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

  .main { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }

  .page-header { margin-bottom: 2rem; }
  .page-header h2 { font-size: 1.4rem; font-weight: 700; }
  .page-header p { font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-top: 0.25rem; }

  .admin-badge {
    display: inline-block;
    background: rgba(212,175,55,0.15);
    border: 1px solid rgba(212,175,55,0.3);
    color: #D4AF37;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-left: 0.5rem;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0.25rem;
    margin-bottom: 2rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 0.35rem;
  }

  .tab-btn {
    flex: 1;
    padding: 0.55rem 1rem;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: rgba(255,255,255,0.4);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: rgba(212,175,55,0.15);
    color: #D4AF37;
    border: 1px solid rgba(212,175,55,0.25);
  }
  .tab-btn:hover:not(.active) { color: rgba(255,255,255,0.7); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Shared ── */
  .section { margin-bottom: 2rem; }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.4);
    margin-bottom: 0.75rem;
  }

  /* Match row — same style for both tabs */
  .match-row {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 0.9rem 1.25rem;
    margin-bottom: 0.6rem;
  }
  .match-row.is-finished { opacity: 0.5; }

  .match-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.65rem;
  }
  .match-header.no-controls { margin-bottom: 0; }

  .match-teams { font-size: 0.9rem; font-weight: 600; }
  .match-time  { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 0.2rem; }

  .score-display {
    font-size: 0.85rem;
    color: #D4AF37;
    font-weight: 700;
    min-width: 60px;
    text-align: center;
  }

  .match-controls {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .score-group { display: flex; align-items: center; gap: 0.4rem; }

  .score-input {
    width: 44px;
    padding: 0.4rem;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .score-input:focus { border-color: #D4AF37; }

  .sep { color: rgba(255,255,255,0.3); font-weight: 700; }

  .winner-select {
    padding: 0.38rem 0.6rem;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: #fff;
    font-size: 0.8rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .winner-select:focus { border-color: #D4AF37; }
  .winner-select option { background: #0a1f0e; }

  .btn-submit {
    padding: 0.4rem 0.9rem;
    background: #1a6b2e;
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .btn-submit:hover { background: #1f8038; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Round dividers (knockout) */
  .round-header {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: rgba(212,175,55,0.6);
    margin: 1.2rem 0 0.5rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid rgba(212,175,55,0.12);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    padding: 0.7rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 999;
    animation: fadeIn 0.2s ease;
  }
  .toast-success { background: #1a6b2e; color: #fff; }
  .toast-error   { background: #c0392b; color: #fff; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .loading { text-align: center; padding: 3rem; color: rgba(255,255,255,0.3); }
  .empty   { text-align: center; padding: 2rem; color: rgba(255,255,255,0.3); font-size: 0.85rem; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/matches">WM Predictor <span>2026</span></a>
  <div style="display:flex;align-items:center;gap:1rem;">
    <span style="font-size:0.8rem;color:rgba(255,255,255,0.4)">Admin Panel</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <h2>Admin Panel <span class="admin-badge">Admin</span></h2>
    <p>Submit match results and update scores.</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('group')">Group Stage</button>
    <button class="tab-btn" onclick="switchTab('knockout')">Knockout</button>
  </div>

  <!-- ══ GROUP STAGE ══ -->
  <div id="tab-group" class="tab-panel active">
    <div class="section">
      <div class="section-title">Pending Results</div>
      <div id="pending-list"><div class="loading">Loading matches...</div></div>
    </div>
    <div class="section">
      <div class="section-title">Finished Matches</div>
      <div id="finished-list"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <!-- ══ KNOCKOUT ══ -->
  <div id="tab-knockout" class="tab-panel">
    <div class="section">
      <div class="section-title">Pending Results</div>
      <div id="ko-pending-list"><div class="loading">Loading...</div></div>
    </div>
    <div class="section">
      <div class="section-title">Finished Matches</div>
      <div id="ko-finished-list"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<script>
  /* ── Tab switching ── */
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'group') || (i === 1 && tab === 'knockout'));
    });
    document.getElementById('tab-group').classList.toggle('active', tab === 'group');
    document.getElementById('tab-knockout').classList.toggle('active', tab === 'knockout');
    if (tab === 'knockout') loadKoMatches();
  }

  /* ══════════════════════════════════════════
     GROUP STAGE
  ══════════════════════════════════════════ */
  async function loadMatches() {
    try {
      const res  = await fetch('/api/matches');
      const data = await res.json();
      renderGroupLists(data.matches || []);
    } catch {
      document.getElementById('pending-list').innerHTML = '<div class="empty">Failed to load matches.</div>';
    }
  }

  function renderGroupLists(matches) {
    const pending  = matches.filter(m => !m.finished);
    const finished = matches.filter(m =>  m.finished);

    document.getElementById('pending-list').innerHTML = pending.length
      ? pending.map(m => buildMatchRow(m, 'group')).join('')
      : '<div class="empty">No pending matches.</div>';

    document.getElementById('finished-list').innerHTML = finished.length
      ? finished.map(m => buildFinishedRow(m)).join('')
      : '<div class="empty">No finished matches yet.</div>';

    document.querySelectorAll('#tab-group .submit-btn').forEach(btn => {
      btn.addEventListener('click', () => submitGroupResult(btn));
    });
  }

  function buildMatchRow(m, tab) {
    const home = m.home_team || 'TBD';
    const away = m.away_team || 'TBD';
    const time = m.kickoff_time ? formatDate(m.kickoff_time) : '—';
    return `
      <div class="match-row">
        <div class="match-header">
          <div>
            <div class="match-teams">${home} vs ${away}</div>
            <div class="match-time">${time}</div>
          </div>
        </div>
        <div class="match-controls">
          <div class="score-group">
            <input class="score-input home-score" type="number" min="0" max="99" placeholder="0">
            <span class="sep">:</span>
            <input class="score-input away-score" type="number" min="0" max="99" placeholder="0">
          </div>
          <button class="btn-submit submit-btn" data-match-id="${m.id}">Submit</button>
        </div>
      </div>`;
  }

  function buildFinishedRow(m) {
    const home = m.home_team || 'TBD';
    const away = m.away_team || 'TBD';
    return `
      <div class="match-row is-finished">
        <div class="match-header no-controls">
          <div>
            <div class="match-teams">${home} vs ${away}</div>
            <div class="match-time">${m.kickoff_time ? formatDate(m.kickoff_time) : '—'}</div>
          </div>
          <div class="score-display">${m.home_score ?? '—'} : ${m.away_score ?? '—'}</div>
        </div>
      </div>`;
  }

  async function submitGroupResult(btn) {
    const row       = btn.closest('.match-row');
    const matchId   = parseInt(btn.dataset.matchId);
    const homeScore = parseInt(row.querySelector('.home-score').value);
    const awayScore = parseInt(row.querySelector('.away-score').value);

    if (isNaN(homeScore) || isNaN(awayScore)) {
      showToast('Please enter both scores.', 'error'); return;
    }

    btn.disabled = true; btn.textContent = '...';

    try {
      const res  = await fetch('/api/results', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ match_id: matchId, home_score: homeScore, away_score: awayScore })
      });
      const data = await res.json();
      if (!res.ok) {
        showToast(data.error || 'Error submitting result.', 'error');
        btn.disabled = false; btn.textContent = 'Submit';
      } else {
        showToast(`Result saved: ${homeScore} : ${awayScore}`, 'success');
        await loadMatches();
      }
    } catch {
      showToast('Network error.', 'error');
      btn.disabled = false; btn.textContent = 'Submit';
    }
  }

  /* ══════════════════════════════════════════
     KNOCKOUT
  ══════════════════════════════════════════ */
  const ROUND_ORDER  = ['R32', 'R16', 'QF', 'SF', 'TP', 'F'];
  const ROUND_LABELS = {
    R32: 'Round of 32', R16: 'Round of 16',
    QF: 'Quarter-finals', SF: 'Semi-finals',
    TP: '3rd Place', F: 'Final'
  };

  async function loadKoMatches() {
    document.getElementById('ko-pending-list').innerHTML  = '<div class="loading">Loading...</div>';
    document.getElementById('ko-finished-list').innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res  = await fetch('/api/knockout/matches');
      const data = await res.json();
      renderKoLists(data.matches || []);
    } catch {
      document.getElementById('ko-pending-list').innerHTML = '<div class="empty">Failed to load.</div>';
    }
  }

  function renderKoLists(matches) {
    const pending  = matches.filter(m => !m.finished);
    const finished = matches.filter(m =>  m.finished);

    // Pending
    if (!pending.length) {
      document.getElementById('ko-pending-list').innerHTML = '<div class="empty">No pending knockout matches.</div>';
    } else {
      const byRound = {};
      pending.forEach(m => { (byRound[m.round] = byRound[m.round] || []).push(m); });
      let html = '';
      ROUND_ORDER.forEach(r => {
        if (!byRound[r]) return;
        html += `<div class="round-header">${ROUND_LABELS[r]}</div>`;
        byRound[r].forEach(m => { html += buildKoRow(m); });
      });
      document.getElementById('ko-pending-list').innerHTML = html;
    }

    // Finished
    if (!finished.length) {
      document.getElementById('ko-finished-list').innerHTML = '<div class="empty">No finished knockout matches yet.</div>';
    } else {
      const byRound = {};
      finished.forEach(m => { (byRound[m.round] = byRound[m.round] || []).push(m); });
      let html = '';
      ROUND_ORDER.forEach(r => {
        if (!byRound[r]) return;
        html += `<div class="round-header">${ROUND_LABELS[r]}</div>`;
        byRound[r].forEach(m => { html += buildKoFinishedRow(m); });
      });
      document.getElementById('ko-finished-list').innerHTML = html;
    }

    document.querySelectorAll('.ko-submit-btn').forEach(btn => {
      btn.addEventListener('click', () => submitKoResult(btn));
    });
  }

  function buildKoRow(m) {
    const home = m.home_team || 'TBD';
    const away = m.away_team || 'TBD';
    const time = m.kickoff_time ? formatDate(m.kickoff_time) : '—';
    return `
      <div class="match-row">
        <div class="match-header">
          <div>
            <div class="match-teams">${home} vs ${away}</div>
            <div class="match-time">Slot ${m.slot ?? '—'} &middot; ${time}</div>
          </div>
        </div>
        <div class="match-controls">
          <div class="score-group">
            <input class="score-input ko-home-score" type="number" min="0" max="99" placeholder="0">
            <span class="sep">:</span>
            <input class="score-input ko-away-score" type="number" min="0" max="99" placeholder="0">
          </div>
          <select class="winner-select ko-winner">
            <option value="">Winner (if draw)</option>
            <option value="${home}">${home}</option>
            <option value="${away}">${away}</option>
          </select>
          <button class="btn-submit ko-submit-btn" data-match-id="${m.id}">Submit</button>
        </div>
      </div>`;
  }

  function buildKoFinishedRow(m) {
    const home = m.home_team || 'TBD';
    const away = m.away_team || 'TBD';
    return `
      <div class="match-row is-finished">
        <div class="match-header no-controls">
          <div>
            <div class="match-teams">${home} vs ${away}</div>
            <div class="match-time">Winner: <strong style="color:#D4AF37">${m.winner || '—'}</strong></div>
          </div>
          <div class="score-display">${m.home_score ?? '—'} : ${m.away_score ?? '—'}</div>
        </div>
      </div>`;
  }

  async function submitKoResult(btn) {
    const row       = btn.closest('.match-row');
    const matchId   = parseInt(btn.dataset.matchId);
    const homeScore = parseInt(row.querySelector('.ko-home-score').value);
    const awayScore = parseInt(row.querySelector('.ko-away-score').value);
    const winner    = row.querySelector('.ko-winner').value.trim();

    if (isNaN(homeScore) || isNaN(awayScore)) {
      showToast('Please enter both scores.', 'error'); return;
    }
    if (homeScore === awayScore && !winner) {
      showToast('Scores are equal — select a winner (penalties).', 'error'); return;
    }

    btn.disabled = true; btn.textContent = '...';

    try {
      const res  = await fetch('/api/knockout/results', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          match_id: matchId, home_score: homeScore,
          away_score: awayScore, winner: winner || null
        })
      });
      const data = await res.json();
      if (!res.ok) {
        showToast(data.error || 'Error submitting result.', 'error');
        btn.disabled = false; btn.textContent = 'Submit';
      } else {
        showToast(`Result saved: ${homeScore} : ${awayScore}`, 'success');
        await loadKoMatches();
      }
    } catch {
      showToast('Network error.', 'error');
      btn.disabled = false; btn.textContent = 'Submit';
    }
  }

  /* ── Shared ── */
  function formatDate(dt) {
    return new Date(dt).toLocaleString('en-GB', {
      day: '2-digit', month: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function showToast(msg, type = 'success') {
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/';
  }

  loadMatches();
</script>
</body>
</html>
