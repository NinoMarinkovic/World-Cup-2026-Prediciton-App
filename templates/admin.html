<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — WM Predictor 2026</title>
<link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
<nav>
  <a class="nav-logo" href="/matches">WM Predictor <span>2026</span></a>
  <div style="display:flex;align-items:center;gap:1rem;">
    <span style="font-size:0.8rem;color:rgba(255,255,255,0.4)">Admin Panel</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <h2>Admin Panel <span class="admin-badge">Admin</span></h2>
    <p>Submit match results and update scores.</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('group')">Group Stage</button>
    <button class="tab-btn" onclick="switchTab('knockout')">Knockout</button>
  </div>

  <!-- ══ GROUP STAGE ══ -->
  <div id="tab-group" class="tab-panel active">
    <div class="section">
      <div class="section-title">Pending Results</div>
      <div id="pending-list"><div class="loading">Loading matches...</div></div>
    </div>
    <div class="section">
      <div class="section-title">Finished Matches</div>
      <div id="finished-list"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <!-- ══ KNOCKOUT ══ -->
  <div id="tab-knockout" class="tab-panel">
    <div class="section">
      <div class="section-title">Pending Results</div>
      <div id="ko-pending-list"><div class="loading">Loading...</div></div>
    </div>
    <div class="section">
      <div class="section-title">Finished Matches</div>
      <div id="ko-finished-list"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<script src="/static/js/admin.js"></script>
</body>
</html>
